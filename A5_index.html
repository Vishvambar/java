<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Factorial Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input[type="text"] { padding: 6px; font-size: 14px; }
        input[type="submit"] { padding: 8px 20px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Calculate Factorial</h2>
    <form action="factorial.jsp" method="post">
        <label for="number">Enter a number:</label><br><br>
        <input type="text" id="number" name="number" placeholder="e.g. 5" required><br><br>
        <input type="submit" value="Calculate Factorial">
    </form>
</body>
</html>
